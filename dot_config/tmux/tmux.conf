set -g prefix C-t
unbind C-b

TMUX_PLUGIN_MANAGER_PATH="$HOME/.tmux/plugins"
set -g @plugin 'tmux-plugins/tpm'

# theme
set -g @plugin 'arcticicestudio/nord-tmux'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# util
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-open'

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -sg escape-time 10
set -g focus-events on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -wg mode-keys vi
set -g mouse on
bind r source-file ~/.config/tmux/tmux.conf

run "/opt/homebrew/opt/tpm/share/tpm/tpm"

if "test ! -d $HOME/.tmux/plugins/tmux-pain-control" \
  "run 'tmux display-message \"[tpm] Installing plugins...\"; /opt/homebrew/opt/tpm/share/tpm/scripts/install_plugins.sh >> /tmp/tmux-plugins.log 2>&1; tmux display-message \"[tpm] Plugins installed. Log: /tmp/tmux-plugins.log\"'"
