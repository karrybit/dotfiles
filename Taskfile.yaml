version: '3'

vars:
  FLAKE: '{{.ROOT_DIR}}/nix'

tasks:
  default:
    silent: true
    cmd: task --list

  nix:check:
    desc: "nix flake check"
    cmds:
      - nix flake check {{.FLAKE}}
      - nix run nixpkgs#statix -- check {{.FLAKE}}
      - nix run nixpkgs#deadnix -- --fail {{.FLAKE}}

  nix:rebuild:
    desc: "Rebuild and activate current profile (requires interactive shell for nixr)"
    cmd: zsh -i -c nixr

  test:
    desc: "Render chezmoi templates (3 profiles) and zsh -n lint"
    cmd: test/render-and-lint.sh

  check:
    desc: "Run all checks: nix:check + nix:lint + test"
    cmds:
      - task: nix:check
      - task: test
